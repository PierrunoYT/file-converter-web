<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Format Converter</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .preview-item {
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            aspect-ratio: 1;
            background: var(--card-background);
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .upload-area {
            border: 2px dashed var(--primary-color);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--card-background);
        }

        .upload-area:hover {
            border-color: var(--secondary-color);
            background: var(--background-color);
        }

        .upload-area i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .format-select {
            margin: 1.5rem 0;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid var(--text-secondary);
            background: var(--card-background);
            color: var(--text-primary);
            width: 100%;
            max-width: 300px;
        }

        .back-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary-color);
        }

        #dropZone {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(99, 102, 241, 0.1);
            backdrop-filter: blur(4px);
            z-index: 1000;
            pointer-events: none;
        }

        #dropZone.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--background-color);
            border-radius: 2px;
            margin-top: 1rem;
            overflow: hidden;
            display: none;
        }

        .progress-bar .progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="dropZone"></div>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='/'">
            <i class="fas fa-arrow-left"></i>
        </button>
        
        <header>
            <h1>Image Converter</h1>
            <p>Convert your images to any format</p>
        </header>

        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <h2>Drop your images here</h2>
            <p>or click to select files</p>
            <input type="file" id="fileInput" multiple accept="image/*,.heic,.HEIC" style="display: none">
        </div>

        <select class="format-select" id="formatSelect">
            <option value="">Select output format</option>
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
            <option value="webp">WEBP</option>
            <option value="gif">GIF</option>
            <option value="heic">HEIC</option>
            <option value="avif">AVIF</option>
            <option value="tiff">TIFF</option>
            <option value="bmp">BMP</option>
        </select>

        <button class="convert-btn" id="convertBtn" disabled>
            Convert Images
        </button>

        <div class="progress-bar" id="progressBar">
            <div class="progress" id="progress"></div>
        </div>

        <div class="preview-grid" id="previewGrid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const formatSelect = document.getElementById('formatSelect');
            const convertBtn = document.getElementById('convertBtn');
            const previewGrid = document.getElementById('previewGrid');
            const dropZone = document.getElementById('dropZone');
            const progressBar = document.getElementById('progressBar');
            const progress = document.getElementById('progress');
            
            let files = [];

            // Handle file selection
            uploadArea.addEventListener('click', () => fileInput.click());
            
            fileInput.addEventListener('change', handleFiles);

            // Handle drag and drop
            document.addEventListener('dragenter', showDropZone);
            document.addEventListener('dragover', (e) => e.preventDefault());
            document.addEventListener('dragleave', hideDropZoneIfNotChild);
            document.addEventListener('drop', handleDrop);

            function showDropZone(e) {
                e.preventDefault();
                dropZone.classList.add('active');
            }

            function hideDropZone() {
                dropZone.classList.remove('active');
            }

            function hideDropZoneIfNotChild(e) {
                if (!e.relatedTarget || !dropZone.contains(e.relatedTarget)) {
                    hideDropZone();
                }
            }

            function handleDrop(e) {
                e.preventDefault();
                hideDropZone();
                const droppedFiles = [...e.dataTransfer.files].filter(file => 
                    file.type.startsWith('image/') || file.name.toLowerCase().endsWith('.heic')
                );
                handleFiles({ target: { files: droppedFiles } });
            }

            function handleFiles(e) {
                files = [...e.target.files];
                updatePreview();
                updateConvertButton();
            }

            function updatePreview() {
                previewGrid.innerHTML = '';
                files.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const div = document.createElement('div');
                        div.className = 'preview-item';
                        div.innerHTML = `
                            <img src="${e.target.result}" alt="Preview">
                            <button class="remove-btn" onclick="removeFile(${index})">
                                <i class="fas fa-times"></i>
                            </button>
                        `;
                        previewGrid.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            }

            function updateConvertButton() {
                convertBtn.disabled = files.length === 0 || !formatSelect.value;
            }

            formatSelect.addEventListener('change', updateConvertButton);

            // Handle file removal
            window.removeFile = (index) => {
                files.splice(index, 1);
                updatePreview();
                updateConvertButton();
            };

            // Handle conversion
            convertBtn.addEventListener('click', async () => {
                const format = formatSelect.value;
                if (!format || files.length === 0) return;

                progressBar.style.display = 'block';
                convertBtn.disabled = true;

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const formData = new FormData();
                    formData.append('image', file);
                    formData.append('format', format);
                    formData.append('filename', file.name.split('.')[0]);

                    try {
                        progress.style.width = `${((i + 1) / files.length) * 100}%`;
                        
                        const response = await fetch('/convert', {
                            method: 'POST',
                            body: formData
                        });

                        if (response.ok) {
                            const blob = await response.blob();
                            const url = window.URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `${file.name.split('.')[0]}.${format}`;
                            document.body.appendChild(a);
                            a.click();
                            window.URL.revokeObjectURL(url);
                            document.body.removeChild(a);
                        } else {
                            throw new Error('Conversion failed');
                        }
                    } catch (error) {
                        console.error('Error converting file:', error);
                        alert(`Error converting ${file.name}`);
                    }
                }

                // Reset after conversion
                setTimeout(() => {
                    progressBar.style.display = 'none';
                    progress.style.width = '0%';
                    convertBtn.disabled = false;
                    files = [];
                    updatePreview();
                    updateConvertButton();
                }, 1000);
            });
        });
    </script>
</body>
</html>
