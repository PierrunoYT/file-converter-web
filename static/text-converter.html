<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Format Converter</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .converter-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: var(--card-background);
            border-radius: 1rem;
            box-shadow: 0 4px 6px var(--shadow-color);
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .preview-item {
            position: relative;
            border-radius: 0.5rem;
            padding: 1rem;
            background: var(--card-background);
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        .preview-item .text-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .preview-item .text-icon {
            font-size: 2rem;
            color: var(--primary-color);
        }

        .preview-item .text-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .preview-item .text-preview {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            max-height: 100px;
            overflow-y: auto;
            padding: 0.5rem;
            background: var(--background-color);
            border-radius: 0.25rem;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .upload-container {
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 2px dashed var(--primary-color);
            border-radius: 1rem;
            padding: 3rem 2rem;
            text-align: center;
            background: var(--background-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--secondary-color);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .upload-area p {
            margin: 0.5rem 0;
            color: var(--text-secondary);
        }

        .conversion-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .format-selection {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        select {
            padding: 0.8rem;
            border: 1px solid var(--primary-color);
            border-radius: 0.5rem;
            background: var(--card-background);
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover {
            border-color: var(--secondary-color);
        }

        .convert-btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .convert-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .convert-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .back-button {
            margin-top: 2rem;
            text-align: center;
        }

        .back-button .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .back-button .btn:hover {
            color: var(--primary-color);
            background: var(--background-color);
        }

        .back-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary-color);
        }

        #dropZone {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(99, 102, 241, 0.1);
            backdrop-filter: blur(4px);
            z-index: 1000;
            pointer-events: none;
        }

        #dropZone.active {
            display: block;
        }

        .progress-container {
            margin: 2rem 0;
        }

        .progress-bar {
            height: 0.8rem;
            background: var(--background-color);
            border-radius: 1rem;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 0.5rem;
            color: var(--text-secondary);
        }

        @media (max-width: 640px) {
            .conversion-options {
                grid-template-columns: 1fr;
            }

            .converter-section {
                padding: 1rem;
            }

            .upload-area {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="dropZone"></div>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-text"></i> Text Format Converter</h1>
            <p>Convert your text documents between different formats</p>
        </header>

        <div class="converter-section">
            <div class="upload-container">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-file-text"></i>
                    <h2>Drop your text files here</h2>
                    <p>or click to select files</p>
                    <input type="file" id="fileInput" multiple accept=".txt,.doc,.docx,.pdf,.rtf,.odt" style="display: none">
                    <p class="file-info">Supported formats: TXT, DOC, DOCX, PDF, RTF, ODT</p>
                </div>
            </div>

            <div class="conversion-options">
                <div class="format-selection">
                    <label for="formatSelect">Convert to:</label>
                    <select id="formatSelect">
                        <option value="">Select format</option>
                        <option value="txt">TXT</option>
                        <option value="doc">DOC</option>
                        <option value="docx">DOCX</option>
                        <option value="pdf">PDF</option>
                        <option value="rtf">RTF</option>
                        <option value="odt">ODT</option>
                    </select>
                </div>

                <button class="convert-btn" id="convertBtn" disabled>
                    <i class="fas fa-cog"></i> Convert Text
                </button>
            </div>

            <div class="progress-container" style="display: none;">
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                </div>
                <p class="progress-text">0%</p>
            </div>

            <div class="preview-grid" id="previewGrid"></div>
        </div>

        <div class="back-button">
            <a href="/" class="btn">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script src="/script.js"></script>
    <script src="/text-converter.js"></script>
</body>
</html>
